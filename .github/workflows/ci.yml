# ============================================================================
# VUMA CI Pipeline
# ============================================================================
# Runs on every push to main and on pull requests targeting main.
# Jobs: build, test (matrix), fmt, clippy, docs
# ============================================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight jobs when a new commit lands on the same branch/PR.
concurrency:
  group: ci-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # ── Build ──────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-03-01
          components: rust-src

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ runner.os }}

      - name: Build workspace
        run: cargo build --workspace --verbose

  # ── Test ───────────────────────────────────────────────────────────────────
  test:
    name: Test (${{ matrix.os }})
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          # macOS-latest runners are Apple Silicon (aarch64), giving us
          # native ARM64 test coverage without cross-compilation.
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-03-01
          components: rust-src
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: test-${{ runner.os }}-${{ matrix.target }}

      - name: Run tests
        run: cargo test --workspace --verbose

  # ── Fmt ────────────────────────────────────────────────────────────────────
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-03-01
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Clippy ─────────────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-03-01
          components: clippy, rust-src

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ runner.os }}

      - name: Run Clippy
        run: cargo clippy --workspace -- -D warnings

  # ── Docs ───────────────────────────────────────────────────────────────────
  docs:
    name: Documentation
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-03-01
          components: rust-src

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: docs-${{ runner.os }}

      - name: Build documentation
        run: cargo doc --workspace --no-deps

      - name: Upload documentation artifact
        uses: actions/upload-artifact@v7
        with:
          name: vuma-docs
          path: target/doc
          retention-days: 7
