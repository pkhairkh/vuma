# ============================================================================
# VUMA Release Pipeline
# ============================================================================
# Triggered on version tag pushes (e.g. v0.2.0).
# Builds optimized release binaries for 4 platforms, creates a GitHub Release,
# and uploads the binaries as release assets.
# ============================================================================

name: Release

on:
  push:
    tags:
      - 'v[0-9]+.*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Only one release pipeline at a time per tag.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# Jobs
# ---------------------------------------------------------------------------
jobs:
  # ── Build release binaries ────────────────────────────────────────────────
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — native build
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use_cross: false
            artifact_name: vuma
            asset_name: vuma-x86_64-linux
          # Linux aarch64 — cross-compile via cross-rs
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            use_cross: true
            artifact_name: vuma
            asset_name: vuma-aarch64-linux
          # macOS x86_64 — native build on Intel runner
          - os: macos-13
            target: x86_64-apple-darwin
            use_cross: false
            artifact_name: vuma
            asset_name: vuma-x86_64-macos
          # Windows x86_64 — native build
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            artifact_name: vuma.exe
            asset_name: vuma-x86_64-windows.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-03-01
          components: rust-src
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      # ── Cross-compilation path (aarch64-linux) ────────────────────────────
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build release (cross)
        if: matrix.use_cross
        run: cross build --release --bin vuma --target ${{ matrix.target }}

      # ── Native build path ─────────────────────────────────────────────────
      - name: Build release (native)
        if: "!matrix.use_cross"
        run: cargo build --release --bin vuma --target ${{ matrix.target }}

      # ── Package binary ────────────────────────────────────────────────────
      - name: Prepare artifact (Linux / macOS)
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.artifact_name }} dist/${{ matrix.asset_name }}
          chmod +x dist/${{ matrix.asset_name }}

      - name: Prepare artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.artifact_name }}" "dist/${{ matrix.asset_name }}"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          if-no-files-found: error
          retention-days: 1

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: false

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog excerpt
        id: changelog
        run: |
          # Try to extract the section for this version from CHANGELOG.md
          if [ -f CHANGELOG.md ]; then
            # Grab everything between the first and second version headings
            CHANGELOG=$(sed -n "/^## \[${VERSION#v}\]/,/^## \[/p" CHANGELOG.md | head -n -1)
            if [ -z "$CHANGELOG" ]; then
              CHANGELOG=$(sed -n "1,/^## /p" CHANGELOG.md)
            fi
          else
            CHANGELOG="Release ${VERSION}. See commit history for details."
          fi
          # Write to file to avoid multi-line env var issues
          echo "$CHANGELOG" > /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: VUMA ${{ steps.version.outputs.VERSION }}
          body_path: /tmp/release_body.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-') }}
          files: |
            artifacts/vuma-x86_64-linux/vuma-x86_64-linux
            artifacts/vuma-aarch64-linux/vuma-aarch64-linux
            artifacts/vuma-x86_64-macos/vuma-x86_64-macos
            artifacts/vuma-x86_64-windows.exe/vuma-x86_64-windows.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
