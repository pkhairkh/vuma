name: Cross-Compile

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Cancel in-flight jobs when a new commit lands.
concurrency:
  group: cross-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  cross-compile:
    name: ${{ matrix.target }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - riscv64gc-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - mips64-unknown-linux-gnuabi64
          - powerpc64-unknown-linux-gnu
          - loongarch64-unknown-linux-gnu
          - wasm32-unknown-unknown
        include:
          # Native target — no cross tooling needed
          - target: x86_64-unknown-linux-gnu
            use_cross: false
          # Targets with good cross-rs / QEMU support
          - target: aarch64-unknown-linux-gnu
            use_cross: true
          - target: riscv64gc-unknown-linux-gnu
            use_cross: true
          - target: armv7-unknown-linux-gnueabihf
            use_cross: true
          - target: mips64-unknown-linux-gnuabi64
            use_cross: true
          - target: powerpc64-unknown-linux-gnu
            use_cross: true
          # LoongArch64 — cross-rs support is limited; fall back to
          # rustup target + cargo check only
          - target: loongarch64-unknown-linux-gnu
            use_cross: false
          # Wasm32 — no OS, build only (no std test possible)
          - target: wasm32-unknown-unknown
            use_cross: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: nightly-2026-03-01
          components: rust-src
          targets: ${{ matrix.target }}

      # ── cross-rs path (QEMU-backed) ──────────────────────────────────
      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@v2
        with:
          tool: cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --workspace --target ${{ matrix.target }}

      # ── Native / check-only path ─────────────────────────────────────
      - name: Build (native x86_64)
        if: "!matrix.use_cross && matrix.target == 'x86_64-unknown-linux-gnu'"
        run: cargo build --workspace --target ${{ matrix.target }}

      - name: Check (loongarch64)
        if: matrix.target == 'loongarch64-unknown-linux-gnu'
        run: cargo check --workspace --target ${{ matrix.target }}

      - name: Build (wasm32)
        if: matrix.target == 'wasm32-unknown-unknown'
        run: cargo build --workspace --target ${{ matrix.target }}
