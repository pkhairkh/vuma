# VUMA pinned toolchain — nightly required for:
#   - inline assembly enhancements (naked_asm, etc.)
#   - unstable features used in bare-metal crate
#   - advanced const generics and trait system features
[toolchain]
channel = "nightly-2026-03-01"
components = ["rustfmt", "clippy", "rust-src"]
targets = ["aarch64-unknown-linux-gnu", "aarch64-unknown-none"]
profile = "default"
