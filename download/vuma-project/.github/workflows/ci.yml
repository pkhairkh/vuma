name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Allow manual trigger for releases or debugging
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Minimum supported Rust version (nightly) — must match rust-toolchain.toml
  RUST_NIGHTLY: nightly-2026-03-01

# ============================================================================
# Jobs
# ============================================================================
jobs:
  # --------------------------------------------------------------------------
  # 1. Formatting check
  # --------------------------------------------------------------------------
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # --------------------------------------------------------------------------
  # 2. Clippy lint
  # --------------------------------------------------------------------------
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: clippy
          targets: aarch64-unknown-linux-gnu, aarch64-unknown-none
      - uses: Swatinem/rust-cache@v2
      - name: Run Clippy (workspace)
        run: cargo clippy --workspace -- -D warnings
      - name: Run Clippy (all targets including tests)
        run: cargo clippy --workspace --all-targets -- -D warnings

  # --------------------------------------------------------------------------
  # 3. Test all crates
  # --------------------------------------------------------------------------
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        crate:
          - vuma
          - vuma-scg
          - vuma-ive
          - vuma-bd
          - vuma-cor
          - vuma-projection
          - vuma-parser
          - vuma-codegen
          - vuma-proof
          - vuma-std
          - vuma-tests
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run tests for ${{ matrix.crate }}
        run: cargo test -p ${{ matrix.crate }} --verbose
      - name: Run doc tests for ${{ matrix.crate }}
        run: cargo test -p ${{ matrix.crate }} --doc || true

  # --------------------------------------------------------------------------
  # 4. Full workspace test (integration)
  # --------------------------------------------------------------------------
  test-workspace:
    name: Test (full workspace)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Run all workspace tests
        run: cargo test --workspace

  # --------------------------------------------------------------------------
  # 5. Build documentation
  # --------------------------------------------------------------------------
  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace docs
        run: cargo doc --workspace --no-deps
      - name: Check doc links (rustdoc)
        run: cargo doc --workspace --no-deps 2>&1 | grep -i "broken" && exit 1 || true
      - name: Upload docs artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuma-docs
          path: target/doc
          retention-days: 7

  # --------------------------------------------------------------------------
  # 6. Cross-compile for aarch64 (Linux user-space)
  # --------------------------------------------------------------------------
  cross-aarch64:
    name: Cross-compile (aarch64-linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-linux-gnu
      - name: Install aarch64 cross-linker
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Cross-compile for aarch64 (debug)
        run: cargo build --target aarch64-unknown-linux-gnu --workspace
      - name: Cross-compile for aarch64 (release)
        run: cargo build --target aarch64-unknown-linux-gnu --workspace --release

  # --------------------------------------------------------------------------
  # 7. Pi 5 bare-metal build (aarch64-unknown-none)
  # --------------------------------------------------------------------------
  pi5-bare:
    name: Pi 5 bare-metal build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-unknown-none
      - name: Install binutils for objcopy
        run: |
          sudo apt-get update
          sudo apt-get install -y binutils-aarch64-linux-gnu
      - uses: Swatinem/rust-cache@v2
      - name: Build vuma-pi5 (bare-metal release)
        run: cargo build --target aarch64-unknown-none --release -p vuma-pi5
      - name: Generate kernel8.img
        run: |
          aarch64-linux-gnu-objcopy -O binary \
            target/aarch64-unknown-none/release/vuma-pi5 \
            src/pi5/kernel8.img || true
          echo "Pi 5 bare-metal build complete"
      - name: Upload Pi 5 artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuma-pi5-image
          path: |
            target/aarch64-unknown-none/release/vuma-pi5
            src/pi5/kernel8.img
          retention-days: 7

  # --------------------------------------------------------------------------
  # 8. Release build (native)
  # --------------------------------------------------------------------------
  build-release:
    name: Build (release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Build workspace (release)
        run: cargo build --workspace --release
      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: vuma-release-linux-x86_64
          path: target/release/vuma
          retention-days: 7

  # --------------------------------------------------------------------------
  # 9. CI gate — all jobs must pass
  # --------------------------------------------------------------------------
  ci-pass:
    name: CI gate
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test, test-workspace, docs, cross-aarch64, pi5-bare, build-release]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          echo "fmt:       ${{ needs.fmt.result }}"
          echo "clippy:    ${{ needs.clippy.result }}"
          echo "test:      ${{ needs.test.result }}"
          echo "workspace: ${{ needs.test-workspace.result }}"
          echo "docs:      ${{ needs.docs.result }}"
          echo "aarch64:   ${{ needs.cross-aarch64.result }}"
          echo "pi5:       ${{ needs.pi5-bare.result }}"
          echo "release:   ${{ needs.build-release.result }}"
          for job in fmt clippy test test-workspace docs cross-aarch64 pi5-bare build-release; do
            result=$(echo "${{ needs.*.result }}" || true)
          done
          # Fail if any required job failed or was cancelled
          if echo "${{ needs.fmt.result }} ${{ needs.clippy.result }} ${{ needs.test.result }} ${{ needs.test-workspace.result }} ${{ needs.docs.result }} ${{ needs.cross-aarch64.result }} ${{ needs.pi5-bare.result }} ${{ needs.build-release.result }}" | grep -qE 'failure|cancelled'; then
            echo "::error::One or more CI jobs failed"
            exit 1
          fi
          echo "All CI jobs passed!"
